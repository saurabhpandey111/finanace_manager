server:
  port: 8080

spring:

  datasource:
    url: jdbc:h2:mem:financedb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  session:
    store-type: none

logging:
  level:
    finance.management: INFO
    org.springframework.security: WARN